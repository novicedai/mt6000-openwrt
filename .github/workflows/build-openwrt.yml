#############################################################################################        
##  2026/04/27  upgrade to openwrt v25.12.2  
##################

name: Build OpenWrt

on:
  repository_dispatch:
  push:
    branches: 
      - main    

env:
  REPO_URL: https://github.com/openwrt/openwrt.git
  REPO_BRANCH: v25.12.2
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  DIY_P3_SH: diy-part3.sh 
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  REMOVE_ARTIFACTS: true
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  DEVICE_NAME:
  FILE_DATE:
  FIRMWARE:


jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential clang flex g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3 python3-pip zlib1g-dev ccache rsync swig unzip file wget libelf-dev python3-distutils bzip2 cmake cpio curl device-tree-compiler fastjar gperf haveged help2man intltool libc6-dev-i386 libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncursesw5-dev libpython3-dev libreadline-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3-pyelftools python3-setuptools qemu-utils scons squashfs-tools subversion texinfo uglifyjs upx-ucl vim xmlto xxd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Install Go 1.25
      run: |
        wget -q https://go.dev/dl/go1.25.0.linux-amd64.tar.gz -O /tmp/go1.25.0.linux-amd64.tar.gz
        sudo tar -C /usr/local -xzf /tmp/go1.25.0.linux-amd64.tar.gz
        rm /tmp/go1.25.0.linux-amd64.tar.gz
        echo "GOPATH=/usr/local/go/bin" >> $GITHUB_ENV
        echo "PATH=$PATH:/usr/local/go/bin" >> $GITHUB_ENV
        /usr/local/go/bin/go version

    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a 

    - name: Change default package
      run: |
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Install feeds
      run: |
        cd openwrt 
        ./scripts/feeds install -a 

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P3_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P3_SH 

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        echo -e "MyMark ... Downloading packages....."
        make download -j8
        echo -e "Check downloaded files..."
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        export PATH=$PATH:/usr/local/go/bin
        export GOTOOLCHAIN=auto
        echo -e "MyMark ... $(nproc) thread compile..."
        make -j$(nproc) V=s && echo "status=success" >> $GITHUB_OUTPUT || { echo "status=failed" >> $GITHUB_OUTPUT; exit 1; }
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Get device name
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt
        DEVICE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_([^=]+)=y/\1/')
        echo "DEVICE_NAME=_${DEVICE}" >> $GITHUB_ENV

    - name: Get device name
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt
        DEVICE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_([^=]+)=y/\1/')
        echo "DEVICE_NAME=_${DEVICE}" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@v4
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true'
      run: |
        echo "=== Checking output directory ==="
        ls -la openwrt/bin/targets/mediatek/filogic/
        echo "=== Finding all firmware files ==="
        find openwrt/bin/targets/mediatek/filogic -type f -name "*.bin" -o -name "*.img" -o -name "*.sysupgrade*" | head -20
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: |
          ${{ env.FIRMWARE }}/*glinet*mt6000*
          ${{ env.FIRMWARE }}/*gl-mt6000*
          ${{ env.FIRMWARE }}/*mt6000*
        if-no-files-found: warn
        retention-days: 3

    - name: Generate release tag
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        touch release.txt
        echo "OpenWrt MT6000 Firmware - $(date +"%Y.%m.%d")" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      if: steps.compile.outputs.status == 'success' && steps.tag.outputs.status == 'success'
      run: |
        gh release create "${{ steps.tag.outputs.release_tag }}" --title "OpenWrt MT6000 - ${{ steps.tag.outputs.release_tag }}" --notes-file release.txt
        for f in "${{ env.FIRMWARE }}"/*glinet*mt6000* "${{ env.FIRMWARE }}"/*gl-mt6000* "${{ env.FIRMWARE }}"/*mt6000*; do
          [ -f "$f" ] && gh release upload "${{ steps.tag.outputs.release_tag }}" "$f"
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Delete workflow runs
      if: steps.compile.outputs.status == 'success'
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 4

    - name: Remove old Releases
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
      run: |
        for tag in $(gh release list --limit 100 | awk 'NR>5 {print $3}'); do
          gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}        

